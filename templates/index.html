<!DOCTYPE html>
<html>

<head>
    <title>AI Interview Coach</title>
</head>

<body>

    <h1>AI Interview Coach</h1>

    <h2>Upload Your Resume</h2>

    <form action="/upload"
          method="POST"
          enctype="multipart/form-data">

        <input type="file"
               name="resume"
               accept=".pdf"
               required>

        <br><br>

        <button type="submit">

            Upload Resume

        </button>

    </form>

    <hr>

    <h2>Answer Evaluation</h2>

    <form action="/evaluate" method="POST">

        <textarea
            name="answer"
            rows="6"
            cols="60"
            placeholder="Type your answer here..."
            required>
        </textarea>

        <br><br>

        <button type="submit">

            Evaluate Answer

        </button>

    </form>

</body>

</html>
